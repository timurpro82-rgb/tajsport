<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TajSport Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0 0 100px 0;
        }

        .header {
            padding: 25px 20px;
            text-align: center;
            background: var(--sec-bg);
            border-radius: 0 0 25px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .header h2 { margin: 0; color: var(--button-color); font-size: 26px; }
        .header p { margin: 5px 0 0; color: var(--hint-color); font-size: 14px; }

        .container { padding: 0 15px; }

        .category-title {
            font-size: 18px;
            font-weight: 700;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 4px solid var(--button-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--sec-bg);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease;
            position: relative;
        }

        .card:active { transform: scale(0.96); }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #fff;
        }

        .name { font-size: 14px; font-weight: 600; height: 38px; overflow: hidden; margin-bottom: 8px; }
        .price { font-size: 17px; font-weight: 800; color: var(--button-color); }

        .add-btn {
            margin-top: 12px;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🏟️ TAJ SPORT</h2>
    <p>Элитная экипировка для чемпионов</p>
</div>

<div class="container">
    <div class="category-title">👟 Футбольная обувь</div>
    <div class="grid">
        <div class="card">
            <span id="badge-1" class="badge">0</span>
            <img src="https://images.weserv.nl/?url=tajsport.tj/upload/iblock/582/precision_blue.jpg">
            <div class="name">Kelme Precision Blue</div>
            <div class="price">450 TJS</div>
            <button class="add-btn" onclick="addToCart(1, 'Kelme Precision', 450)">В корзину</button>
        </div>
        <div class="card">
            <span id="badge-2" class="badge">0</span>
            <img src="https://images.weserv.nl/?url=tajsport.tj/upload/iblock/a2b/ball_ucl.jpg">
            <div class="name">Adidas UCL Pro 2024</div>
            <div class="price">350 TJS</div>
            <button class="add-btn" onclick="addToCart(2, 'Мяч Adidas UCL', 350)">В корзину</button>
        </div>
    </div>

    <div class="category-title">🥊 Снаряжение</div>
    <div class="grid">
        <div class="card">
            <span id="badge-3" class="badge">0</span>
            <img src="https://images.weserv.nl/?url=tajsport.tj/upload/iblock/c1d/gloves_nike.jpg">
            <div class="name">Перчатки Nike GK</div>
            <div class="price">280 TJS</div>
            <button class="add-btn" onclick="addToCart(3, 'Перчатки Nike', 280)">В корзину</button>
        </div>
        <div class="card">
            <span id="badge-4" class="badge">0</span>
            <img src="https://images.weserv.nl/?url=tajsport.tj/upload/iblock/e3f/bag_joma.jpg">
            <div class="name">Сумка Joma Training</div>
            <div class="price">220 TJS</div>
            <button class="add-btn" onclick="addToCart(4, 'Сумка Joma', 220)">В корзину</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    let cart = {};
    let total = 0;

    function addToCart(id, name, price) {
        if (!cart[id]) cart[id] = { name: name, price: price, count: 0 };
        cart[id].count++;
        total += price;

        let badge = document.getElementById(`badge-${id}`);
        badge.innerText = cart[id].count;
        badge.style.display = 'block';

        tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ: ${total} TJS`);
        tg.MainButton.show();
        tg.HapticFeedback.impactOccurred('medium');
    }

    tg.onEvent('mainButtonClicked', function() {
        let items = Object.values(cart).map(i => `${i.name} x${i.count}`);
        tg.sendData(JSON.stringify({
            action: 'order_with_profile',
            items: items,
            total: total
        }));
        tg.close();
    });
</script>
</body>
</html>
