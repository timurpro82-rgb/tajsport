<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TajSport Wholesale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e0e;
            --text-color: #f0f0f0;
            --accent: #e63946;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 120px;
        }

        header {
            padding: 15px;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 2px solid var(--accent);
        }

        .container {
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 8px;
            background: white;
            margin-bottom: 8px;
        }

        .product-name { 
            font-weight: 600; 
            font-size: 12px; 
            height: 34px; 
            overflow: hidden; 
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .product-price { color: var(--accent); font-weight: 800; font-size: 15px; margin-bottom: 4px; }
        .product-min { font-size: 9px; color: #888; margin-bottom: 8px; }

        .counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            border-radius: 6px;
            padding: 3px;
        }

        .counter button {
            background: var(--accent);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            display: none;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--accent);
            z-index: 1000;
        }

        .cart-bar.visible { display: flex; }

        .btn-checkout {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color:var(--accent); font-size: 20px;">TAJ SPORT OPTOM</h1>
</header>

<div class="container" id="products-list"></div>

<div class="cart-bar" id="cartBar">
    <div>
        <div id="cartTotal" style="font-weight: 800; font-size: 18px;">0 TJS</div>
        <div id="cartStatus" style="font-size: 10px;">Проверка...</div>
    </div>
    <button class="btn-checkout" onclick="checkout()">ОФОРМИТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ТОВАРЫ С ССЫЛКАМИ НА ФОТО С TAJSPORT.TJ
    const products = [
        { 
            id: 101, 
            name: "Футзалки Nike Mercurial", 
            price: 450, 
            cat: 'boots', 
            img: "https://tajsport.tj/image/cache/catalog/1111/mercurial-white-700x700.jpg" 
        },
        { 
            id: 102, 
            name: "Мяч Select Brilliant Super", 
            price: 550, 
            cat: 'balls', 
            img: "https://tajsport.tj/image/cache/catalog/ мячи/select-brillant-700x700.jpg" 
        },
        { 
            id: 103, 
            name: "Перчатки Uhlsport Soft", 
            price: 320, 
            cat: 'gloves', 
            img: "https://tajsport.tj/image/cache/catalog/перчатки/uhlsport-soft-700x700.jpg" 
        },
        { 
            id: 104, 
            name: "Форма Реал Мадрид 24/25", 
            price: 180, 
            cat: 'clothing', 
            img: "https://tajsport.tj/image/cache/catalog/форма/real-25-700x700.jpg" 
        },
        { 
            id: 105, 
            name: "Сумка Joma Training", 
            price: 280, 
            cat: 'bags', 
            img: "https://tajsport.tj/image/cache/catalog/сумки/joma-bag-700x700.jpg" 
        },
        { 
            id: 106, 
            name: "Щитки Nike Mercurial", 
            price: 95, 
            cat: 'accessories', 
            img: "https://tajsport.tj/image/cache/catalog/щитки/nike-lite-700x700.jpg" 
        }
    ];

    let cart = {};

    function render() {
        const container = document.getElementById('products-list');
        container.innerHTML = products.map(p => {
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            const count = cart[p.id] || 0;
            return `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" onerror="this.src='https://via.placeholder.com/150?text=TajSport'">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} TJS</div>
                    <div class="product-min">Опт от ${min} шт.</div>
                    <div class="counter">
                        <button onclick="change(${p.id}, -1)">-</button>
                        <span>${count}</span>
                        <button onclick="change(${p.id}, 1)">+</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function change(id, delta) {
        const current = cart[id] || 0;
        const next = current + delta;
        if (next <= 0) delete cart[id];
        else cart[id] = next;
        updateCart();
        render();
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        let errors = [];

        for (const id in cart) {
            const p = products.find(x => x.id == id);
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            if (cart[id] < min) errors.push(p.name);
            total += p.price * cart[id];
            count += cart[id];
        }

        const bar = document.getElementById('cartBar');
        const status = document.getElementById('cartStatus');
        document.getElementById('cartTotal').textContent = total + " TJS";

        if (count > 0) {
            bar.classList.add('visible');
            if (errors.length > 0) {
                status.textContent = "⚠️ Минимум не набран";
                status.style.color = "#ff4d4d";
            } else {
                status.textContent = "✅ Лимиты ОК";
                status.style.color = "#27ae60";
            }
        } else {
            bar.classList.remove('visible');
        }
    }

    function checkout() {
        const orderItems = [];
        let totalAmount = 0;
        let errors = [];

        for (const id in cart) {
            const p = products.find(x => x.id == id);
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            if (cart[id] < min) errors.push(`${p.name} (нужно ${min}шт)`);
            orderItems.push(`${p.name} x${cart[id]}`);
            totalAmount += p.price * cart[id];
        }

        if (errors.length > 0) {
            alert("Ошибка:\n" + errors.join('\n'));
            return;
        }

        tg.sendData(JSON.stringify({
            action: 'order_with_profile',
            items: orderItems,
            total: totalAmount
        }));
        tg.close();
    }

    render();
</script>
</body>
</html>
