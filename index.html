<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TajSport Wholesale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e0e;
            --text-color: #f0f0f0;
            --accent: #e63946;
            --card-bg: #1a1a1a;
            --error: #ff4d4d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 120px;
        }

        header {
            padding: 20px;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 2px solid var(--accent);
        }

        .container {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .product-emoji { font-size: 32px; margin-bottom: 8px; text-align: center; }
        .product-name { font-weight: 600; font-size: 13px; height: 32px; overflow: hidden; margin-bottom: 4px; }
        .product-price { color: var(--accent); font-weight: 800; font-size: 16px; margin-bottom: 4px; }
        .product-min { font-size: 10px; color: #888; margin-bottom: 10px; }

        .counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            border-radius: 6px;
            padding: 4px;
        }

        .counter button {
            background: var(--accent);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 4px;
            font-weight: bold;
        }

        .counter span { font-weight: 600; width: 30px; text-align: center; }

        /* Бар корзины */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            background: #222;
            padding: 15px;
            border-radius: 12px;
            display: none;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
        }

        .cart-bar.visible { display: flex; }

        .btn-checkout {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color:var(--accent); font-size: 22px;">TAJ SPORT OPTOM</h1>
    <div style="font-size: 10px; opacity: 0.6;">Минимум: Крупное 5шт / Мелочь 10шт</div>
</header>

<div class="container" id="products-list"></div>

<div class="cart-bar" id="cartBar">
    <div>
        <div id="cartTotal" style="font-weight: 800; font-size: 18px;">0 TJS</div>
        <div id="cartStatus" style="font-size: 10px; color: #888;">Проверка лимитов...</div>
    </div>
    <button class="btn-checkout" onclick="checkout()">ОФОРМИТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Категории: boots, clothing (5шт), balls, gloves, bags, accessories (10шт)
    const products = [
        { id: 1, name: "Бутсы Nike Mercurial", price: 850, cat: 'boots', emoji: "👟" },
        { id: 2, name: "Футбольный мяч Nike", price: 250, cat: 'balls', emoji: "⚽" },
        { id: 3, name: "Вратарские перчатки", price: 180, cat: 'gloves', emoji: "🧤" },
        { id: 4, name: "Форма сб. Таджикистана", price: 150, cat: 'clothing', emoji: "👕" },
        { id: 5, name: "Спортивная сумка", price: 300, cat: 'bags', emoji: "👜" },
        { id: 6, name: "Гетры игровые", price: 35, cat: 'accessories', emoji: "🧦" },
        { id: 7, name: "Шиповки Adidas", price: 750, cat: 'boots', emoji: "👟" },
        { id: 8, name: "Костюм тренировочный", price: 450, cat: 'clothing', emoji: "🧥" }
    ];

    let cart = {};

    function render() {
        const container = document.getElementById('products-list');
        container.innerHTML = products.map(p => {
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            const count = cart[p.id] || 0;
            return `
                <div class="product-card">
                    <div class="product-emoji">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} TJS</div>
                    <div class="product-min">Мин. заказ: ${min} шт.</div>
                    <div class="counter">
                        <button onclick="change(${p.id}, -1)">-</button>
                        <span>${count}</span>
                        <button onclick="change(${p.id}, 1)">+</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function change(id, delta) {
        const current = cart[id] || 0;
        const next = current + delta;
        if (next <= 0) delete cart[id];
        else cart[id] = next;
        updateCart();
        render();
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        let errors = [];

        for (const id in cart) {
            const p = products.find(x => x.id == id);
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            if (cart[id] < min) {
                errors.push(p.name);
            }
            total += p.price * cart[id];
            count += cart[id];
        }

        const bar = document.getElementById('cartBar');
        const status = document.getElementById('cartStatus');
        const totalEl = document.getElementById('cartTotal');

        if (count > 0) {
            bar.classList.add('visible');
            totalEl.textContent = total + " TJS";
            if (errors.length > 0) {
                status.textContent = "⚠️ Есть товары ниже лимита";
                status.style.color = "#ff4d4d";
            } else {
                status.textContent = "✅ Лимиты соблюдены";
                status.style.color = "#27ae60";
            }
        } else {
            bar.classList.remove('visible');
        }
    }

    function checkout() {
        const orderItems = [];
        let totalAmount = 0;
        let errors = [];

        for (const id in cart) {
            const p = products.find(x => x.id == id);
            const min = (p.cat === 'boots' || p.cat === 'clothing') ? 5 : 10;
            
            if (cart[id] < min) {
                errors.push(`${p.name}: минимум ${min}шт (у вас ${cart[id]})`);
            }
            
            orderItems.push(`${p.name} x${cart[id]}`);
            totalAmount += p.price * cart[id];
        }

        if (errors.length > 0) {
            alert("НЕЛЬЗЯ ОФОРМИТЬ:\n\n" + errors.join('\n'));
            tg.HapticFeedback.notificationOccurred('error');
            return;
        }

        tg.sendData(JSON.stringify({
            action: 'order_with_profile',
            items: orderItems,
            total: totalAmount
        }));
        tg.close();
    }

    render();
</script>
</body>
</html>
