<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TajSport Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e0e;
            --text-color: #f0f0f0;
            --accent: #e63946;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 100px;
        }

        header {
            padding: 20px;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 2px solid var(--accent);
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent); }

        .container {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .product-emoji { font-size: 40px; margin-bottom: 10px; }
        .product-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .product-price { color: var(--accent); font-weight: 800; margin-bottom: 10px; }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        /* Плашка корзины внизу */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            display: none; /* Скрыта по умолчанию */
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            z-index: 1000;
        }

        .cart-bar.visible { display: flex; }

        .btn-checkout {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>TAJ SPORT</h1>
    <p style="font-size: 12px; opacity: 0.7;">Оптовый магазин спортивных товаров</p>
</header>

<div class="container" id="products">
    </div>

<div class="cart-bar" id="cartBar">
    <div>
        <div style="font-size: 12px; opacity: 0.6;">Итого:</div>
        <div id="cartTotal" style="font-weight: 800; font-size: 18px; color: #fff;">0 TJS</div>
    </div>
    <button class="btn-checkout" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран

    const products = [
        { id: 1, name: "Футбольный мяч Nike", price: 250, emoji: "⚽" },
        { id: 2, name: "Бутсы Adidas Predator", price: 850, emoji: "👟" },
        { id: 3, name: "Перчатки вратарские", price: 180, emoji: "🧤" },
        { id: 4, name: "Спортивная сумка", price: 320, emoji: "👜" },
        { id: 5, name: "Набор гантелей 10кг", price: 450, emoji: "🏋️" },
        { id: 6, name: "Скакалка скоростная", price: 45, emoji: "🪢" }
    ];

    let cart = {};

    function renderProducts() {
        const container = document.getElementById('products');
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-emoji">${p.emoji}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price} TJS</div>
                <button class="btn-add" onclick="addToCart(${p.id})">Добавить</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        cart[id] = (cart[id] || 0) + 1;
        updateCart();
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        for (const id in cart) {
            const product = products.find(p => p.id == id);
            total += product.price * cart[id];
            count += cart[id];
        }

        const bar = document.getElementById('cartBar');
        document.getElementById('cartTotal').textContent = total + " TJS";
        
        if (count > 0) {
            bar.classList.add('visible');
        }
    }

    function checkout() {
        const orderItems = [];
        let totalAmount = 0;

        for (const id in cart) {
            const product = products.find(p => p.id == id);
            orderItems.push(`${product.name} (x${cart[id]})`);
            totalAmount += product.price * cart[id];
        }

        if (orderItems.length === 0) return;

        // Формируем объект данных
        const data = {
            action: 'order_with_profile',
            items: orderItems,
            total: totalAmount
        };

        // ОТПРАВКА В ТЕЛЕГРАМ БОТ
        // Эта функция закроет Mini App и отправит сообщение боту
        tg.sendData(JSON.stringify(data));
    }

    renderProducts();
</script>

</body>
</html>
